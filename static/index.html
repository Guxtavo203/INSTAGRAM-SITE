<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio Instagram</title>
<style>
:root {
  --ig1: #833ab4; --ig2: #c13584; --ig3: #e1306c; --ig4: #f77737; --ig5: #fcaf45;
  --grad: linear-gradient(45deg, var(--ig1), var(--ig2), var(--ig3), var(--ig4), var(--ig5));
  --text: #1a1a1a; --muted: #8e8e8e; --border: #dbdbdb; --bg: #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; min-height: 100vh; }

.page {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* â”€â”€ Logo â”€â”€ */
.logo {
  width: 64px; height: 64px; border-radius: 18px;
  background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 20px;
  box-shadow: 0 6px 24px rgba(225,48,108,.35);
}
h1 {
  font-size: 28px; font-weight: 900; letter-spacing: -.02em;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px; text-align: center;
}
.sub { color: var(--muted); font-size: 14px; margin-bottom: 40px; text-align: center; }

/* â”€â”€ URL box â”€â”€ */
.url-box {
  width: 100%; max-width: 540px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 16px; padding: 20px 22px;
  box-shadow: 0 2px 20px rgba(0,0,0,.07);
  margin-bottom: 14px;
}
.url-box label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
.url-row { display: flex; gap: 10px; }
input {
  flex: 1; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 11px 14px; font-size: 14px; color: var(--text); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
input:focus { border-color: var(--ig3); box-shadow: 0 0 0 3px rgba(225,48,108,.15); }
input::placeholder { color: #c7c7c7; }

.btn-load {
  background: var(--grad); color: #fff; border: none;
  border-radius: 10px; padding: 11px 22px; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: transform .15s, box-shadow .15s, opacity .15s;
  box-shadow: 0 4px 16px rgba(225,48,108,.3);
}
.btn-load:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(225,48,108,.45); }
.btn-load:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* â”€â”€ Progress â”€â”€ */
.prog-wrap { height: 4px; background: #efefef; border-radius: 100px; overflow: hidden; margin-top: 14px; display: none; }
.prog-bar  { height: 100%; background: var(--grad); border-radius: 100px; width: 0%; transition: width .4s ease; }
.msg { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; display: none; }
.msg.err { color: #e74c3c; }
.msg.ok  { color: #27ae60; font-weight: 600; }

/* â”€â”€ Post preview â”€â”€ */
#postPreview {
  width: 100%; max-width: 540px;
  display: none; margin-bottom: 14px;
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,.07);
}
#postPreview iframe {
  width: 100%; border: none; display: block;
  min-height: 560px; border-radius: 20px;
}

/* â”€â”€ Comments list â”€â”€ */
#commentsList {
  width: 100%; max-width: 540px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 20px 22px;
  box-shadow: 0 2px 20px rgba(0,0,0,.07);
  display: none; margin-bottom: 14px;
}
#commentsList h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }
.comments-scroll { max-height: 260px; overflow-y: auto; padding-right: 4px; }
.comments-scroll::-webkit-scrollbar { width: 3px; }
.comments-scroll::-webkit-scrollbar-thumb { background: #dbdbdb; border-radius: 2px; }
.comment-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid #f0f0f0;
  animation: fadeUp .2s ease backwards;
}
.comment-row:last-child { border-bottom: none; }
@keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.c-av { width: 36px; height: 36px; border-radius: 50%; flex-shrink:0; object-fit: cover; border: 1.5px solid #efefef; }
.c-body { flex: 1; min-width: 0; }
.c-user { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.c-text { font-size: 13px; color: var(--muted); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* â”€â”€ Raffle area â”€â”€ */
#raffleArea {
  width: 100%; max-width: 540px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 32px 24px;
  box-shadow: 0 2px 20px rgba(0,0,0,.07);
  text-align: center; display: none;
}

.info-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(45deg,rgba(131,58,180,.07),rgba(225,48,108,.07));
  border: 1px solid rgba(225,48,108,.18);
  border-radius: 100px; padding: 5px 14px;
  font-size: 12px; font-weight: 600; color: var(--ig2);
  margin-bottom: 24px;
}

/* â”€â”€ Slot â”€â”€ */
.slot {
  background: linear-gradient(135deg,rgba(131,58,180,.05),rgba(225,48,108,.05),rgba(247,119,55,.05));
  border: 1.5px solid rgba(225,48,108,.13);
  border-radius: 16px; padding: 36px 20px; margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.slot-glow {
  position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(45deg,rgba(131,58,180,.1),rgba(225,48,108,.1),rgba(252,175,69,.1));
  opacity: 0; transition: opacity .4s; pointer-events: none;
}
.slot-glow.on { opacity: 1; }
.slot-name {
  font-size: clamp(24px,5vw,48px); font-weight: 900; letter-spacing: -.025em;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  position: relative; z-index: 1; line-height: 1.1;
}
.slot-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .15em; color: var(--muted); margin-top: 8px;
  position: relative; z-index: 1; transition: color .3s;
}
.slot-label.live { color: var(--ig3); }

.btn-raffle {
  width: 100%; background: var(--grad); color: #fff; border: none;
  border-radius: 14px; padding: 18px; font-size: 16px; font-weight: 800;
  cursor: pointer; letter-spacing: .06em; text-transform: uppercase;
  box-shadow: 0 8px 28px rgba(225,48,108,.35);
  transition: transform .15s, box-shadow .15s, opacity .15s;
}
.btn-raffle:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(225,48,108,.5); }
.btn-raffle:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

/* â”€â”€ Winner â”€â”€ */
#winnerArea {
  width: 100%; max-width: 540px;
  background: linear-gradient(135deg,rgba(131,58,180,.06),rgba(225,48,108,.06),rgba(252,175,69,.06));
  border: 1.5px solid rgba(225,48,108,.22);
  border-radius: 20px; padding: 40px 24px;
  text-align: center; display: none; margin-top: 14px;
  animation: wPop .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes wPop { from { opacity:0; transform:scale(.8); } to { opacity:1; transform:scale(1); } }
.w-trophy { font-size: 52px; margin-bottom: 14px; display: block; }
.w-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--ig2); margin-bottom: 14px; }
.w-av {
  width: 80px; height: 80px; border-radius: 50%;
  display: block; margin: 0 auto 16px; object-fit: cover;
  padding: 3px; background: var(--grad);
  box-shadow: 0 4px 20px rgba(225,48,108,.3);
}
.w-name {
  font-size: clamp(20px,4vw,34px); font-weight: 900; letter-spacing: -.02em;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
}
.w-comment { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.w-btns { display: flex; gap: 10px; justify-content: center; }
.btn-sec {
  background: transparent; color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px 18px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: border-color .2s, color .2s;
}
.btn-sec:hover { border-color: var(--ig3); color: var(--ig3); }

#confetti { position: fixed; inset:0; pointer-events:none; z-index:100; display:none; }

@media(max-width:500px) {
  .url-row { flex-direction: column; }
  .btn-load { width: 100%; }
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="page">
  <div class="logo">&#128247;</div>
  <h1>Sorteio Instagram</h1>
  <p class="sub">Cole a URL do post e sorteie o vencedor</p>

  <!-- URL input -->
  <div class="url-box">
    <label>Link do post do Instagram</label>
    <div class="url-row">
      <input id="urlInput" type="text" placeholder="https://www.instagram.com/p/ABC123/">
      <button class="btn-load" id="loadBtn" onclick="loadComments()">Carregar</button>
    </div>
    <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="prog"></div></div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Post preview -->
  <div id="postPreview">
    <iframe id="postFrame" scrolling="no" allowtransparency="true"></iframe>
  </div>

  <!-- Comments list -->
  <div id="commentsList">
    <h3 id="commentsTitle">Comentarios</h3>
    <div class="comments-scroll" id="commentsScroll"></div>
  </div>

  <!-- Raffle -->
  <div id="raffleArea">
    <div class="info-pill" id="infoPill">0 participantes</div>
    <div class="slot">
      <div class="slot-glow" id="slotGlow"></div>
      <div class="slot-name" id="slotName">?</div>
      <div class="slot-label" id="slotLabel">Pronto para sortear</div>
    </div>
    <button class="btn-raffle" id="raffleBtn" onclick="startRaffle()">&#127922; SORTEAR AGORA</button>
  </div>

  <!-- Winner -->
  <div id="winnerArea">
    <span class="w-trophy">&#127881;</span>
    <div class="w-tag">Vencedor</div>
    <img id="wAv" class="w-av" src="" alt="">
    <div class="w-name" id="wName"></div>
    <div class="w-comment" id="wComment"></div>
    <div class="w-btns">
      <button class="btn-sec" onclick="resetRaffle()">&#8635; Sortear novamente</button>
      <button class="btn-sec" onclick="copyResult()">&#128203; Copiar</button>
    </div>
  </div>
</div>

<script>
let participants = [], winners = [], isSpinning = false, spinTimer = null;

async function loadComments() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return showMsg('Cole a URL do post.', 'err');

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('progWrap').style.display = 'block';
  document.getElementById('raffleArea').style.display = 'none';
  document.getElementById('winnerArea').style.display = 'none';
  document.getElementById('commentsList').style.display = 'none';
  showPostPreview(url);
  setProgress(15); showMsg('Carregando comentarios...');

  try {
    const res  = await fetch('/api/comments?url=' + encodeURIComponent(url));
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Erro desconhecido');

    // dedup por username â€” 1 entrada por pessoa
    const seen = new Set();
    participants = data.comments.filter(c => {
      if (seen.has(c.username)) return false;
      seen.add(c.username); return true;
    });

    setProgress(100);
    showMsg(data.comments.length + ' comentarios â€” ' + participants.length + ' participantes unicos.', 'ok');
    document.getElementById('infoPill').textContent = participants.length + ' participantes';
    renderComments(data.comments);
    document.getElementById('raffleArea').style.display = 'block';
    document.getElementById('slotName').textContent = '?';
    document.getElementById('slotLabel').textContent = 'Pronto para sortear';
    document.getElementById('slotLabel').classList.remove('live');
    document.getElementById('slotGlow').classList.remove('on');
  } catch(e) {
    showMsg('Erro: ' + e.message, 'err');
    setProgress(0);
  }

  document.getElementById('loadBtn').disabled = false;
}

function showPostPreview(url) {
  const match = url.match(/instagram\.com\/(?:p|reel|tv)\/([A-Za-z0-9_-]+)/);
  if (!match) return;
  const shortcode = match[1];
  const embedUrl = 'https://www.instagram.com/p/' + shortcode + '/embed/';
  document.getElementById('postFrame').src = embedUrl;
  document.getElementById('postPreview').style.display = 'block';
}

function renderComments(comments) {
  const wrap = document.getElementById('commentsList');
  const scroll = document.getElementById('commentsScroll');
  document.getElementById('commentsTitle').textContent = comments.length + ' comentarios';
  scroll.innerHTML = '';
  comments.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'comment-row';
    row.style.animationDelay = Math.min(i * 0.012, 0.5) + 's';
    const av = c.avatar || avatarSvg(c.username);
    row.innerHTML =
      '<img class="c-av" src="' + av + '" onerror="this.src=\'' + avatarSvg(c.username) + '\'">' +
      '<div class="c-body"><div class="c-user">@' + c.username + '</div>' +
      '<div class="c-text">' + (c.text || '') + '</div></div>';
    scroll.appendChild(row);
  });
  wrap.style.display = 'block';
}

function startRaffle() {
  if (isSpinning || !participants.length) return;
  isSpinning = true;
  document.getElementById('raffleBtn').disabled = true;
  document.getElementById('winnerArea').style.display = 'none';
  document.getElementById('slotGlow').classList.add('on');
  document.getElementById('slotLabel').textContent = 'Sorteando...';
  document.getElementById('slotLabel').classList.add('live');
  spin(0, 2800, pickWinner);
}

function spin(elapsed, duration, done) {
  if (elapsed >= duration) { clearTimeout(spinTimer); done(); return; }
  const p = participants[Math.floor(Math.random() * participants.length)];
  document.getElementById('slotName').textContent = '@' + p.username;
  const progress = elapsed / duration;
  let interval = 50;
  if (progress > 0.65) interval = 50 + ((progress - 0.65) / 0.35) * 450;
  spinTimer = setTimeout(() => spin(elapsed + interval, duration, done), interval);
}

function pickWinner() {
  const winner = participants[Math.floor(Math.random() * participants.length)];
  winners = [winner];
  isSpinning = false;
  document.getElementById('raffleBtn').disabled = false;
  document.getElementById('slotName').textContent = '@' + winner.username;
  document.getElementById('slotLabel').textContent = 'VENCEDOR!';

  const wa = document.getElementById('winnerArea');
  wa.style.display = 'block';

  const av = document.getElementById('wAv');
  av.src = winner.avatar || avatarSvg(winner.username);
  av.onerror = () => { av.src = avatarSvg(winner.username); };

  document.getElementById('wName').textContent = '@' + winner.username;
  document.getElementById('wComment').textContent = winner.text
    ? '"' + winner.text.slice(0, 80) + (winner.text.length > 80 ? '...' : '') + '"' : '';

  launchConfetti();
  setTimeout(() => wa.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
}

function resetRaffle() {
  document.getElementById('winnerArea').style.display = 'none';
  document.getElementById('slotName').textContent = '?';
  document.getElementById('slotLabel').textContent = 'Pronto para sortear';
  document.getElementById('slotLabel').classList.remove('live');
  document.getElementById('slotGlow').classList.remove('on');
}

function copyResult() {
  navigator.clipboard.writeText('@' + (winners[0]?.username || '')).then(() => alert('Copiado!'));
}

const PAIRS = [['#6366f1','#8b5cf6'],['#ec4899','#f43f5e'],['#06b6d4','#3b82f6'],['#10b981','#059669'],['#f59e0b','#ef4444'],['#8b5cf6','#a855f7']];
function avatarSvg(name) {
  const l = (name||'?').charAt(0).toUpperCase();
  const [c1,c2] = PAIRS[(name||'').charCodeAt(0) % PAIRS.length];
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">' +
    '<stop offset="0%" stop-color="' + c1 + '"/><stop offset="100%" stop-color="' + c2 + '"/></linearGradient></defs>' +
    '<circle cx="40" cy="40" r="40" fill="url(#g)"/>' +
    '<text x="40" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="700" font-family="sans-serif">' + l + '</text></svg>');
}

function launchConfetti() {
  const cvs = document.getElementById('confetti');
  cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  const ctx = cvs.getContext('2d');
  const COLS = ['#833ab4','#c13584','#e1306c','#f77737','#fcaf45','#f472b6'];
  const pp = Array.from({length:140}, () => ({
    x:Math.random()*cvs.width, y:-15-Math.random()*80,
    w:8+Math.random()*8, h:4+Math.random()*5,
    r:Math.random()*Math.PI*2, vx:(Math.random()-.5)*6, vy:3+Math.random()*4,
    vr:(Math.random()-.5)*.25, col:COLS[Math.floor(Math.random()*COLS.length)]
  }));
  let f = 0;
  (function draw() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    pp.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.vy+=.06;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-f/200);
      ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.col; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    f++;
    if (f < 220) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,cvs.width,cvs.height); cvs.style.display='none'; }
  })();
}

function setProgress(p) { document.getElementById('prog').style.width = p + '%'; }
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.style.display = 'block'; el.textContent = text;
  el.className = 'msg' + (type ? ' '+type : '');
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadComments(); });
</script>
</body>
</html>
